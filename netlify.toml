# Netlify configuration for Next.js static export
[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  SKIP_ENV_VALIDATION = "1"
  NEXT_TELEMETRY_DISABLED = "1"
  HUSKY = "0"
[build]
  command = "npm run build --ignore-scripts"
  publish = "out"

[build.environment]
  SKIP_ENV_VALIDATION = "1"
  NEXT_TELEMETRY_DISABLED = "1"
